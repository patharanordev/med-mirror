name: med_mirror_mobile
description: "MedMirror iPad Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Features
  camera: ^0.10.5+9
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2 # To save the Host IP
  
  # UI/UX
  flutter_animate: ^4.5.0
  google_fonts: ^8.0.1
  lucide_icons: ^0.257.0 # Matching the web's icons
  glassmorphism: ^3.0.0 # Helper for glass effect
  
  # Utilities
  permission_handler: ^11.3.0
  image: ^4.1.3 # Image processing
  vad: ^0.0.7+1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  assets:
    - assets/models/vad/
