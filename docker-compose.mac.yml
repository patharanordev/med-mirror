services:
  # ---------------------------------------------------------
  # 1. Skin Segmentation Service (CPU / M1 Optimized)
  # ---------------------------------------------------------
  segmentation:
    build: 
      context: ./segmentation
      dockerfile: Dockerfile.mac
    container_name: med_mirror_segmentation
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - ecosystem_commonnet
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8000
      - MODEL_PATH=/app/models/segmentation

  # ---------------------------------------------------------
  # 2. Medical Agent Service (LangGraph - macOS Optimized)
  # ---------------------------------------------------------
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.mac
    container_name: med_mirror_agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - ecosystem_commonnet
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./agent:/app
    env_file:
      - ./agent/.env.macos
    depends_on:
      - ollama

  # ---------------------------------------------------------
  # 3. Local LLM Backend (Ollama)
  # ---------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: med_mirror_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - ecosystem_commonnet
    volumes:
      - ~/.ollama:/root/.ollama

networks:
  edge_net:
    driver: bridge
