info:
  name: chat
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8001/chat
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "message": "I have dark circle..."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
