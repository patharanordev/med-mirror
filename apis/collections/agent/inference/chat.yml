info:
  name: chat
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8001/chat/1
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "message": "Great... I’m basically a panda’s twin at this point."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
