services:
  # ---------------------------------------------------------
  # 1. Frontend: The Web Interface (Dockerized Next.js)
  # ---------------------------------------------------------
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: med_mirror_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - edge_net
    environment:
      - AGENT_SERVICE_URL=http://med_mirror_agent:8001

  # ---------------------------------------------------------
  # 2. Skin Segmentation Service (NVIDIA Optimized)
  # ---------------------------------------------------------
  segmentation:
    build: 
      context: ./segmentation
      dockerfile: Dockerfile
    container_name: med_mirror_segmentation
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - edge_net
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8000
      - MODEL_PATH=/app/models/segmentation
      # Ensure segmentation runs on CPU or GPU if supported by Dockerfile
      # For now assuming CPU fallback or standard CUDA if base image supports it

  # ---------------------------------------------------------
  # 3. Medical Agent Service (LangGraph)
  # ---------------------------------------------------------
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.win
    container_name: med_mirror_agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - edge_net
    env_file:
      - ./agent/.env.winos
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---------------------------------------------------------
  # 4. Local LLM Backend (Ollama)
  # ---------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: med_mirror_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - edge_net
    volumes:
      - ~/.ollama:/root/.ollama
    # GPU Support for Windows (WSL2 / NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]


networks:
  edge_net:
    driver: bridge
