services:

  # ---------------------------------------------------------
  # 1. Skin Segmentation Service (NVIDIA Optimized)
  # ---------------------------------------------------------
  segmentation:
    build: 
      context: ./segmentation
      dockerfile: Dockerfile
    container_name: med_mirror_segmentation
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - ecosystem_commonnet
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8000
      - MODEL_PATH=/app/models/segmentation
      # Ensure segmentation runs on CPU or GPU if supported by Dockerfile
      # For now assuming CPU fallback or standard CUDA if base image supports it

  # ---------------------------------------------------------
  # 2. Medical Agent Service (LangGraph)
  # ---------------------------------------------------------
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile.win
    container_name: med_mirror_agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - ecosystem_commonnet
    volumes:
      - ./hf_cache:/root/.cache/huggingface
      - ./agent:/app
    env_file:
      - ./agent/.env.winos
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---------------------------------------------------------
  # 3. Local LLM Backend (Ollama)
  # ---------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: med_mirror_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - ecosystem_commonnet
    volumes:
      - ~/.ollama:/root/.ollama
    # GPU Support for Windows (WSL2 / NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  ecosystem_commonnet:
    name: commonnet
    external: true
