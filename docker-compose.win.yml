services:
  # ---------------------------------------------------------
  # 1. Frontend: The Web Interface (Dockerized Next.js)
  # ---------------------------------------------------------
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: med_mirror_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - edge_net

  # ---------------------------------------------------------
  # 2. Skin Segmentation Service (NVIDIA Optimized)
  # ---------------------------------------------------------
  segmentation:
    build: 
      context: ./segmentation
      dockerfile: Dockerfile
    container_name: med_mirror_segmentation
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - edge_net
    volumes:
      - ./models:/app/models
    environment:
      - PORT=8000
      - MODEL_PATH=/app/models/segmentation
      # Ensure segmentation runs on CPU or GPU if supported by Dockerfile
      # For now assuming CPU fallback or standard CUDA if base image supports it

  # ---------------------------------------------------------
  # 3. Medical Agent Service (LangGraph)
  # ---------------------------------------------------------
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: med_mirror_agent
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - edge_net
    environment:
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_API_KEY=ollama
      - LLM_MODEL=gemma3:4b
    depends_on:
      - ollama

  # ---------------------------------------------------------
  # 4. Local LLM Backend (Ollama)
  # ---------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: med_mirror_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - edge_net
    volumes:
      - ~/.ollama:/root/.ollama
    # GPU Support for Windows (WSL2 / NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]


networks:
  edge_net:
    driver: bridge
